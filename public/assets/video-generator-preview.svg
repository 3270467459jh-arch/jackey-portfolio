<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3748;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#1a202c;stop-opacity:0.95"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f56565"/>
      <stop offset="100%" style="stop-color:#ed64a6"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="600" fill="url(#bg2)" rx="16"/>

  <!-- Decorative circles -->
  <circle cx="850" cy="100" r="120" fill="#667eea" opacity="0.08"/>
  <circle cx="150" cy="500" r="80" fill="#ed64a6" opacity="0.08"/>

  <!-- Title area -->
  <text x="500" y="50" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="bold">🎬 电商短视频脚本 + AI视频提示词生成器</text>
  <text x="500" y="75" text-anchor="middle" fill="#a0aec0" font-size="13">输入产品信息 → 生成脚本 → 输出即梦/可灵视频提示词</text>

  <!-- Left panel: Input form mockup -->
  <rect x="30" y="100" width="320" height="470" rx="12" fill="url(#cardGrad)" stroke="#4a5568" stroke-width="1"/>
  <rect x="30" y="100" width="320" height="36" rx="12" fill="#2d3748"/>
  <circle cx="52" cy="118" r="6" fill="#fc8181"/>
  <circle cx="72" cy="118" r="6" fill="#fbd38d"/>
  <circle cx="92" cy="118" r="6" fill="#68d391"/>
  <text x="190" y="123" text-anchor="middle" fill="#a0aec0" font-size="11">产品信息输入</text>

  <!-- Form fields -->
  <text x="50" y="160" fill="#a0aec0" font-size="11">产品名称</text>
  <rect x="50" y="168" width="280" height="30" rx="6" fill="#1a202c" stroke="#4a5568" stroke-width="1"/>
  <text x="62" y="188" fill="#e2e8f0" font-size="12">Pro 降噪蓝牙耳机</text>

  <text x="50" y="218" fill="#a0aec0" font-size="11">核心卖点</text>
  <rect x="50" y="226" width="280" height="65" rx="6" fill="#1a202c" stroke="#4a5568" stroke-width="1"/>
  <text x="62" y="244" fill="#e2e8f0" font-size="11">主动降噪 45dB</text>
  <text x="62" y="262" fill="#e2e8f0" font-size="11">续航 36 小时</text>
  <text x="62" y="280" fill="#e2e8f0" font-size="11">IPX5 防水</text>

  <text x="50" y="312" fill="#a0aec0" font-size="11">视频类型</text>
  <rect x="50" y="320" width="280" height="30" rx="6" fill="#1a202c" stroke="#4a5568" stroke-width="1"/>
  <text x="62" y="340" fill="#e2e8f0" font-size="12">产品展示（痛点切入）</text>
  <text x="310" y="340" fill="#a0aec0" font-size="12">▼</text>

  <text x="50" y="372" fill="#a0aec0" font-size="11">目标平台</text>
  <rect x="50" y="380" width="130" height="28" rx="6" fill="#667eea" opacity="0.3" stroke="#667eea" stroke-width="1"/>
  <text x="115" y="399" text-anchor="middle" fill="#667eea" font-size="11" font-weight="bold">TikTok</text>
  <rect x="190" y="380" width="140" height="28" rx="6" fill="#1a202c" stroke="#4a5568" stroke-width="1"/>
  <text x="260" y="399" text-anchor="middle" fill="#a0aec0" font-size="11">Reels</text>

  <text x="50" y="432" fill="#a0aec0" font-size="11">视频时长</text>
  <rect x="50" y="440" width="280" height="30" rx="6" fill="#1a202c" stroke="#4a5568" stroke-width="1"/>
  <text x="62" y="460" fill="#e2e8f0" font-size="12">30秒</text>

  <!-- Generate button -->
  <rect x="50" y="490" width="280" height="42" rx="8" fill="url(#btnGrad)"/>
  <text x="190" y="516" text-anchor="middle" fill="white" font-size="14" font-weight="bold">🚀 生成脚本 + 视频提示词</text>

  <!-- Right panel: Output -->
  <rect x="380" y="100" width="590" height="220" rx="12" fill="url(#cardGrad)" stroke="#4a5568" stroke-width="1"/>
  <rect x="380" y="100" width="590" height="32" rx="12" fill="url(#accent2)"/>
  <text x="675" y="121" text-anchor="middle" fill="white" font-size="12" font-weight="bold">📝 生成结果 — 视频脚本</text>

  <!-- Script table mockup -->
  <rect x="400" y="145" width="550" height="24" rx="4" fill="#1a202c"/>
  <text x="420" y="162" fill="#a0aec0" font-size="10" font-weight="bold">时间</text>
  <text x="480" y="162" fill="#a0aec0" font-size="10" font-weight="bold">画面描述</text>
  <text x="700" y="162" fill="#a0aec0" font-size="10" font-weight="bold">配音文案</text>
  <text x="890" y="162" fill="#a0aec0" font-size="10" font-weight="bold">音效</text>

  <line x1="400" y1="172" x2="950" y2="172" stroke="#4a5568" stroke-width="0.5"/>
  <text x="420" y="190" fill="#68d391" font-size="10">0-3s</text>
  <text x="480" y="190" fill="#e2e8f0" font-size="10">特写：耳机从口袋取出，背景嘈杂地铁</text>
  <text x="700" y="190" fill="#cbd5e0" font-size="10">"Tired of noisy commutes?"</text>
  <text x="890" y="190" fill="#a0aec0" font-size="10">地铁噪音</text>

  <line x1="400" y1="200" x2="950" y2="200" stroke="#4a5568" stroke-width="0.5"/>
  <text x="420" y="218" fill="#68d391" font-size="10">3-8s</text>
  <text x="480" y="218" fill="#e2e8f0" font-size="10">慢动作：戴上耳机，背景声消失</text>
  <text x="700" y="218" fill="#cbd5e0" font-size="10">"One click. Pure silence."</text>
  <text x="890" y="218" fill="#a0aec0" font-size="10">降噪音效</text>

  <line x1="400" y1="228" x2="950" y2="228" stroke="#4a5568" stroke-width="0.5"/>
  <text x="420" y="246" fill="#68d391" font-size="10">8-15s</text>
  <text x="480" y="246" fill="#e2e8f0" font-size="10">Split-screen: 左侧普通耳机 vs 右侧本品</text>
  <text x="700" y="246" fill="#cbd5e0" font-size="10">"45dB ANC vs regular buds"</text>
  <text x="890" y="246" fill="#a0aec0" font-size="10">对比音效</text>

  <line x1="400" y1="256" x2="950" y2="256" stroke="#4a5568" stroke-width="0.5"/>
  <text x="420" y="274" fill="#68d391" font-size="10">15-25s</text>
  <text x="480" y="274" fill="#e2e8f0" font-size="10">产品360°展示，参数文字弹出</text>
  <text x="700" y="274" fill="#cbd5e0" font-size="10">"36h battery. IPX5. $49.99"</text>
  <text x="890" y="274" fill="#a0aec0" font-size="10">节奏BGM</text>

  <line x1="400" y1="284" x2="950" y2="284" stroke="#4a5568" stroke-width="0.5"/>
  <text x="420" y="302" fill="#68d391" font-size="10">25-30s</text>
  <text x="480" y="302" fill="#e2e8f0" font-size="10">CTA画面：产品+价格+Link in bio</text>
  <text x="700" y="302" fill="#cbd5e0" font-size="10">"Link in bio. Limited stock."</text>
  <text x="890" y="302" fill="#a0aec0" font-size="10">提示音</text>

  <!-- Video prompts panel -->
  <rect x="380" y="340" width="590" height="230" rx="12" fill="url(#cardGrad)" stroke="#ed64a6" stroke-width="1.5"/>
  <rect x="380" y="340" width="590" height="32" rx="12" fill="#ed64a6"/>
  <text x="675" y="361" text-anchor="middle" fill="white" font-size="12" font-weight="bold">🎥 即梦/可灵 AI视频生成提示词</text>

  <text x="400" y="392" fill="#fbd38d" font-size="11" font-weight="bold">镜头1（0-3秒）：</text>
  <rect x="400" y="398" width="550" height="32" rx="4" fill="#1a202c"/>
  <text x="412" y="418" fill="#68d391" font-size="10">Close-up shot of a hand pulling matte black wireless earbuds from jacket pocket,</text>
  <text x="412" y="432" fill="#68d391" font-size="10">busy subway background, shallow depth of field, warm tungsten lighting, 9:16 vertical</text>

  <text x="400" y="455" fill="#fbd38d" font-size="11" font-weight="bold">镜头2（3-8秒）：</text>
  <rect x="400" y="461" width="550" height="32" rx="4" fill="#1a202c"/>
  <text x="412" y="481" fill="#68d391" font-size="10">Slow motion: person puts on earbuds, visual sound wave dissolves from edges to center,</text>
  <text x="412" y="495" fill="#68d391" font-size="10">background transitions from noisy to serene, cinematic lighting shift cool to warm</text>

  <text x="400" y="518" fill="#fbd38d" font-size="11" font-weight="bold">镜头3（8-15秒）：</text>
  <rect x="400" y="524" width="550" height="32" rx="4" fill="#1a202c"/>
  <text x="412" y="544" fill="#68d391" font-size="10">Split screen comparison: left side regular earbuds with visible noise particles,</text>
  <text x="412" y="558" fill="#68d391" font-size="10">right side product with clean silent bubble effect, dramatic side lighting, tech style</text>

  <!-- Copy buttons -->
  <rect x="880" y="400" width="55" height="20" rx="4" fill="#4a5568"/>
  <text x="907" y="414" text-anchor="middle" fill="#e2e8f0" font-size="9">复制</text>
  <rect x="880" y="463" width="55" height="20" rx="4" fill="#4a5568"/>
  <text x="907" y="477" text-anchor="middle" fill="#e2e8f0" font-size="9">复制</text>
  <rect x="880" y="526" width="55" height="20" rx="4" fill="#4a5568"/>
  <text x="907" y="540" text-anchor="middle" fill="#e2e8f0" font-size="9">复制</text>
</svg>
