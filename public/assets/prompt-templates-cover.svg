  <text x="705" y="252" fill="#a0aec0" font-size="10">RSA搜索广告 · 购物广告 · 展示广告</text>

  <rect x="690" y="272" width="260" height="50" rx="8" fill="#1a202c"/>
  <text x="705" y="292" fill="#b794f4" font-size="11" font-weight="bold">产品 Listing</text>
  <text x="705" y="312" fill="#a0aec0" font-size="10">Amazon全套 · 多站点本地化 · 独立站</text>

  <rect x="690" y="332" width="260" height="50" rx="8" fill="#1a202c"/>
  <text x="705" y="352" fill="#b794f4" font-size="11" font-weight="bold">邮件营销</text>
  <text x="705" y="372" fill="#a0aec0" font-size="10">欢迎序列 · 弃购挽回 · 促销 · 复购</text>

  <!-- Copy preview -->
  <rect x="690" y="400" width="260" height="80" rx="8" fill="#1a202c" stroke="#4a5568" stroke-width="0.5"/>
  <text x="702" y="420" fill="#a0aec0" font-size="9">A/B测试变体生成：</text>
  <text x="702" y="438" fill="#d6bcfa" font-size="9">版本A — 痛点导向：Primary Text + CTA</text>
  <text x="702" y="453" fill="#d6bcfa" font-size="9">版本B — 利益导向：Primary Text + CTA</text>
  <text x="702" y="468" fill="#d6bcfa" font-size="9">版本C — 社交证明：Primary Text + CTA</text>

  <rect x="690" y="492" width="100" height="22" rx="4" fill="#9f7aea" opacity="0.2"/>
  <text x="740" y="507" text-anchor="middle" fill="#b794f4" font-size="9" font-weight="bold">4 平台</text>
  <rect x="800" y="492" width="80" height="22" rx="4" fill="#9f7aea" opacity="0.2"/>
  <text x="840" y="507" text-anchor="middle" fill="#b794f4" font-size="9" font-weight="bold">批量生成</text>
  <rect x="890" y="492" width="60" height="22" rx="4" fill="#9f7aea" opacity="0.2"/>
  <text x="920" y="507" text-anchor="middle" fill="#b794f4" font-size="9" font-weight="bold">A/B测试</text>
