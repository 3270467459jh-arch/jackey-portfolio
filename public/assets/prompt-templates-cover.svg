<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="cardGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3748;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#1a202c;stop-opacity:0.95"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38b2ac"/>
      <stop offset="100%" style="stop-color:#4fd1c5"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ed8936"/>
      <stop offset="100%" style="stop-color:#f6ad55"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9f7aea"/>
      <stop offset="100%" style="stop-color:#b794f4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="600" fill="url(#bg3)" rx="16"/>

  <!-- Title -->
  <text x="500" y="45" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="bold">📋 跨境电商 AIGC 提示词模板库</text>
  <text x="500" y="72" text-anchor="middle" fill="#a0aec0" font-size="13">覆盖短视频脚本 · 广告文案 · 产品图生成 三大核心场景</text>

  <!-- Category 1: Short Video -->
  <rect x="30" y="100" width="300" height="470" rx="12" fill="url(#cardGrad3)" stroke="#38b2ac" stroke-width="1.5"/>
  <rect x="30" y="100" width="300" height="36" rx="12" fill="url(#greenGrad)"/>
  <text x="180" y="123" text-anchor="middle" fill="white" font-size="13" font-weight="bold">🎬 短视频脚本模板</text>

  <!-- Video template items -->
  <rect x="50" y="152" width="260" height="50" rx="8" fill="#1a202c"/>
  <text x="65" y="172" fill="#4fd1c5" font-size="11" font-weight="bold">产品展示类</text>
  <text x="65" y="192" fill="#a0aec0" font-size="10">痛点切入 · Before/After · 快速展示</text>

  <rect x="50" y="212" width="260" height="50" rx="8" fill="#1a202c"/>
  <text x="65" y="232" fill="#4fd1c5" font-size="11" font-weight="bold">开箱测评类</text>
  <text x="65" y="252" fill="#a0aec0" font-size="10">悬念开箱 · 对比开箱 · ASMR风格</text>

  <rect x="50" y="272" width="260" height="50" rx="8" fill="#1a202c"/>
  <text x="65" y="292" fill="#4fd1c5" font-size="11" font-weight="bold">产品对比类</text>
  <text x="65" y="312" fill="#a0aec0" font-size="10">价格PK · 功能横评 · 新旧对比</text>

  <rect x="50" y="332" width="260" height="50" rx="8" fill="#1a202c"/>
  <text x="65" y="352" fill="#4fd1c5" font-size="11" font-weight="bold">热门Hook公式</text>
  <text x="65" y="372" fill="#a0aec0" font-size="10">好奇心 · 痛点 · 数据 · FOMO · 社交证明</text>

  <!-- Prompt preview -->
  <rect x="50" y="400" width="260" height="80" rx="8" fill="#1a202c" stroke="#4a5568" stroke-width="0.5"/>
  <text x="62" y="420" fill="#a0aec0" font-size="9">模板示例：</text>
  <text x="62" y="438" fill="#68d391" font-size="9">你是TikTok爆款视频脚本创作者...</text>
  <text x="62" y="453" fill="#68d391" font-size="9">请为{{产品名称}}创作一个{{时长}}的</text>
  <text x="62" y="468" fill="#68d391" font-size="9">短视频脚本，使用痛点切入型结构...</text>

  <rect x="50" y="492" width="80" height="22" rx="4" fill="#38b2ac" opacity="0.2"/>
  <text x="90" y="507" text-anchor="middle" fill="#4fd1c5" font-size="9" font-weight="bold">4 类模板</text>
  <rect x="140" y="492" width="90" height="22" rx="4" fill="#38b2ac" opacity="0.2"/>
  <text x="185" y="507" text-anchor="middle" fill="#4fd1c5" font-size="9" font-weight="bold">15+ 公式</text>
  <rect x="240" y="492" width="70" height="22" rx="4" fill="#38b2ac" opacity="0.2"/>
  <text x="275" y="507" text-anchor="middle" fill="#4fd1c5" font-size="9" font-weight="bold">TikTok</text>

