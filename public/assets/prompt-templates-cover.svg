  <rect x="370" y="492" width="90" height="22" rx="4" fill="#ed8936" opacity="0.2"/>
  <text x="415" y="507" text-anchor="middle" fill="#f6ad55" font-size="9" font-weight="bold">25 场景</text>
  <rect x="470" y="492" width="80" height="22" rx="4" fill="#ed8936" opacity="0.2"/>
  <text x="510" y="507" text-anchor="middle" fill="#f6ad55" font-size="9" font-weight="bold">4 风格</text>
  <rect x="560" y="492" width="70" height="22" rx="4" fill="#ed8936" opacity="0.2"/>
  <text x="595" y="507" text-anchor="middle" fill="#f6ad55" font-size="9" font-weight="bold">6 品类</text>

  <!-- Category 3: Ad Copy -->
  <rect x="670" y="100" width="300" height="470" rx="12" fill="url(#cardGrad3)" stroke="#9f7aea" stroke-width="1.5"/>
  <rect x="670" y="100" width="300" height="36" rx="12" fill="url(#purpleGrad)"/>
